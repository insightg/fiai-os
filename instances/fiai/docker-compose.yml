# FIAI — Docker Compose
# Uses the shared FIAI OS core with fiai instance config

services:
  fiai-backend:
    container_name: fiai-backend
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - FIAI_INSTANCE=fiai
      - DB_PATH=/app/data/fiai.db
      - PORT=3001
      - UPLOADS_DIR=/app/data/uploads
      - CONTEXT_DIR=/app/data/context
      - NODE_OPTIONS=--max-old-space-size=8192
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - fiai-data:/app/data
      - ../../vpn:/app/vpn:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - npm-network
      - fiai-internal

  fiai-frontend:
    container_name: fiai-frontend
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    environment:
      - BACKEND_HOST=fiai-backend
    restart: unless-stopped
    depends_on:
      - fiai-backend
    networks:
      - npm-network
      - fiai-internal

networks:
  npm-network:
    external: true
  fiai-internal:
    driver: bridge

volumes:
  fiai-data:
    external: true
    name: fiai-os_fiai-data
