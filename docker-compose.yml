services:
  bernardini-frontend:
    container_name: bernardini-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_OPENROUTER_API_KEY=${VITE_OPENROUTER_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - bernardini-backend
    networks:
      - npm-network
      - bernardini-internal

  bernardini-backend:
    container_name: bernardini-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - DB_PATH=/app/data/bernardini.db
      - JWT_SECRET=${JWT_SECRET:-bernardini-secret-key-2026}
      - PORT=3001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - UPLOADS_DIR=/app/data/uploads
      - CONTEXT_DIR=/app/data/context
      - TTS_API_URL=${TTS_API_URL:-http://host.docker.internal:7777/v1/audio/speech}
      - EMAIL_USER=${EMAIL_USER:-fiaios@insightg.it}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-gg.Giobbe7}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST:-imaps.aruba.it}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtps.aruba.it}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bernardini-data:/app/data
      - ./vpn:/app/vpn:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - npm-network
      - bernardini-internal

networks:
  npm-network:
    external: true
  bernardini-internal:
    driver: bridge

volumes:
  bernardini-data:
